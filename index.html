<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electrical Engineer Planner 2026</title>
    
    <meta name="theme-color" content="#c3e8ff">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --light-cyan: #e0f7fa;
            --soft-blue: #c3e8ff;
            --tech-blue: #4facfe;
            --white-glass: rgba(255, 255, 255, 0.75);
            --text-dark: #2c3e50;
            --warning-red: #ff7675;
            --warning-bg: #ffeaa7;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--light-cyan) 0%, #ffffff 50%, var(--soft-blue) 100%);
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        h1, h2, h3, .calendar-header {
            font-family: 'Nunito', sans-serif;
        }

        /* --- Header Glowing --- */
        .header-glow {
            background: linear-gradient(to right, #0984e3, #00cec9, #74b9ff);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0px 4px 15px rgba(0, 206, 201, 0.3);
            letter-spacing: 1px;
        }

        /* --- Glassmorphism Cards (3D Effect) --- */
        .glass-card {
            background: var(--white-glass);
            border-radius: 20px;
            box-shadow: 0 10px 30px 0 rgba(74, 144, 226, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px 0 rgba(74, 144, 226, 0.25);
        }

        /* --- Form Elements --- */
        input[type="text"], input[type="number"], input[type="date"], input[type="time"], select, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(116, 185, 255, 0.4);
            border-radius: 10px;
            padding: 10px 15px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            color: var(--text-dark);
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            background: #ffffff;
            border-color: #0984e3;
            box-shadow: 0 0 10px rgba(116, 185, 255, 0.3);
        }

        button.btn-cool {
            background: linear-gradient(135deg, #00cec9 0%, #0984e3 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(9, 132, 227, 0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        button.btn-cool:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(9, 132, 227, 0.5);
        }

        /* --- Checkbox --- */
        .custom-checkbox {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #0984e3;
            border-radius: 5px;
            cursor: pointer;
            position: relative;
            background: white;
            transition: all 0.2s ease;
        }
        
        .custom-checkbox:checked {
            background: #0984e3;
            border-color: #0984e3;
        }
        
        .custom-checkbox:checked::after {
            content: '\f00c';
            font-family: 'FontAwesome';
            color: white;
            font-size: 12px;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* --- List Items --- */
        .list-item {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid #0984e3;
            transition: all 0.3s ease;
        }
        
        .list-item.completed {
            opacity: 0.6;
            text-decoration: line-through;
            border-left-color: #dfe6e9;
        }

        /* --- Panic Warning System --- */
        .panic-warning {
            background: #fff0f0 !important;
            border-left: 5px solid var(--warning-red) !important;
            animation: pulse-panic 2s infinite;
        }
        .panic-text {
            color: var(--warning-red);
            font-weight: 700;
        }

        @keyframes pulse-panic {
            0% { box-shadow: 0 0 0 0 rgba(255, 118, 117, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 118, 117, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 118, 117, 0); }
        }

        /* --- Calendar UI --- */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }
        .calendar-day {
            padding: 8px 5px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .calendar-day:hover {
            background: #81ecec;
            transform: scale(1.05);
        }
        .
